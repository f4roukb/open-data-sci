# Manually publish an existing tag to PyPI and create its GitHub Release.
#
# Run from the Actions tab, passing the tag to publish (e.g. v0.2.0). Tags are
# created automatically when a main -> release PR merges (see tag.yaml), so the
# usual flow is: merge to release, then trigger this workflow on the new tag.
#
# Decoupling publish from tagging means a tag can exist without being on PyPI
# yet, and a failed publish can be re-run on the same tag.
name: Publish

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g. v0.2.0)"
        required: true
        type: string

jobs:
  publish:
    name: publish open-data-sci
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    defaults:
      run:
        working-directory: libs/open-data-sci

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag exists
        run: |
          TAG="${{ inputs.tag }}"
          if ! git rev-parse -q --verify "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "::error::Tag '$TAG' does not exist. Run the Tag Release workflow first."
            exit 1
          fi
          git checkout "$TAG"

      - name: Verify tag matches pyproject version
        run: |
          TAG="${{ inputs.tag }}"
          VERSION=$(sed -n 's/^version = "\([^"]*\)".*/\1/p' pyproject.toml | head -n1)
          if [ -z "$VERSION" ]; then
            echo "::error::Could not read project.version from pyproject.toml"
            exit 1
          fi
          if [ "$TAG" != "v$VERSION" ]; then
            echo "::error::Tag '$TAG' does not match pyproject version 'v$VERSION'."
            exit 1
          fi
          echo "Tag $TAG matches pyproject version."

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Build
        run: uv build

      - name: Publish to PyPI
        run: uv publish
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ inputs.tag }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists; skipping creation."
          else
            gh release create "$TAG" \
              --title "$TAG" \
              --generate-notes \
              dist/*
          fi
