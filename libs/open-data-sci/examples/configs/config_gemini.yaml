# OpenDataSci — Google Gemini (AI Studio) config
#
# Usage:
#   opendatasci data.csv --config examples/config_gemini.yaml
#
# Prerequisites:
#   pip install "open-data-sci[gemini]"
#
# Set your API key:
#   export GOOGLE_API_KEY=AIza...
#
# TUI flags override any value here at launch.

# ── Primary model ─────────────────────────────────────────────────────────────
provider: gemini
model: gemini-2.5-pro

# ── Secondary (auxiliary) model ───────────────────────────────────────────────
secondary_provider: gemini
secondary_model: gemini-2.5-flash

# ── Sampling ──────────────────────────────────────────────────────────────────
temperature: 0.1

# ── Agent identity ────────────────────────────────────────────────────────────
name: Sai

# ── Web access ────────────────────────────────────────────────────────────────
extra_web_domains:
  - arxiv.org
  - huggingface.co
  - paperswithcode.com
  - kaggle.com

# ── Parallelism ───────────────────────────────────────────────────────────────
worker_timeout_seconds: 600

# ── Context management ────────────────────────────────────────────────────────
midturn_compaction_threshold: 80000

# ── API key ───────────────────────────────────────────────────────────────────
# Prefer the GOOGLE_API_KEY env var over hardcoding here.
# google_api_key: AIza...

# ── Diagnostics ───────────────────────────────────────────────────────────────