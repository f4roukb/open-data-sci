# OpenDataSci — Anthropic config
#
# Usage:
#   opendatasci data.csv --config examples/config_anthropic.yaml
#
# Set your API key:
#   export ANTHROPIC_API_KEY=sk-ant-...
#
# TUI flags override any value here at launch:
#   opendatasci data.csv --config examples/config_anthropic.yaml --model claude-opus-4-8
#
# Fields that cannot coexist with others are commented out with an explanation.
# All remaining fields are active and can be tuned freely.

# ── Primary model ─────────────────────────────────────────────────────────────
# Best reasoning for complex analysis and competition tasks.
provider: anthropic
model: claude-sonnet-4-6

# ── Secondary (auxiliary) model ───────────────────────────────────────────────
# Used for lightweight tasks: memory summarisation, dataset card updates, etc.
# Mixing providers lets you choose the best cost/quality trade-off per task.
# Requires OPENAI_API_KEY in the environment (independent of ANTHROPIC_API_KEY).
secondary_provider: openai
secondary_model: gpt-4o-mini

# ── Sampling & reasoning ──────────────────────────────────────────────────────
# temperature: Anthropic overrides this to 1 automatically when extended
# thinking is active, so this value only affects non-thinking calls.
temperature: 0.1

# Extended thinking token budget for deep multi-step reasoning.
# Increase for hard problems; decrease to reduce latency and cost.
thinking_budget: 8000

# ── Agent identity ────────────────────────────────────────────────────────────
name: Sai

# ── Web access ────────────────────────────────────────────────────────────────
# Domains the fetch_url tool may access, on top of the built-in allowlist.
extra_web_domains:
  - arxiv.org
  - huggingface.co
  - paperswithcode.com
  - kaggle.com

# Uncomment override_web_domains to REPLACE the built-in allowlist entirely.
# This conflicts with extra_web_domains in intent: use one approach or the other.
# override_web_domains:
#   - arxiv.org
#   - huggingface.co

# ── Parallelism ───────────────────────────────────────────────────────────────
# Maximum wall-clock seconds for all spawned worker agents to finish.
# Set to null to disable the timeout entirely (workers may hang indefinitely).
worker_timeout_seconds: 600

# ── Context management ────────────────────────────────────────────────────────
# Token count after which the agent's context is compacted mid-turn (execution mode only).
midturn_compaction_threshold: 80000

# ── API keys & endpoints ──────────────────────────────────────────────────────
# Per-provider API key fields — prefer setting the env var instead of
# hardcoding a secret here.  Only set the field for the provider(s) you use:
#   anthropic_api_key  → ANTHROPIC_API_KEY
#   openai_api_key     → OPENAI_API_KEY  (also used by vllm)
#   google_api_key     → GOOGLE_API_KEY  (gemini only)
#   azure_api_key      → AZURE_OPENAI_API_KEY  (or use service-principal vars; see below)
# bedrock and vertexai do not use an API key; they use cloud-native auth (see below).
# anthropic_api_key: sk-ant-...

# aws_region: AWS region for Bedrock.
#   Falls back to the REGION env var, then "us-east-1".
#   Has no effect on other providers.
# aws_region: us-east-1

# azure_endpoint: Azure OpenAI resource endpoint URL. Required for "azure".
#   Falls back to AZURE_OPENAI_ENDPOINT env var.
# azure_endpoint: https://my-resource.openai.azure.com

# azure_api_version: Azure OpenAI API version.
#   Falls back to AZURE_OPENAI_API_VERSION env var, then "2025-01-01-preview".
# azure_api_version: 2025-01-01-preview

# google_cloud_project: GCP project ID for Vertex AI.
#   Falls back to GOOGLE_CLOUD_PROJECT env var.
# google_cloud_project: my-gcp-project

# google_cloud_location: Vertex AI region.
#   Falls back to GOOGLE_CLOUD_LOCATION env var, then "us-central1".
# google_cloud_location: us-central1

# llm_server_base_url: Custom API endpoint. Required for "ollama" and "vllm".
# Falls back to LLM_SERVER_BASE_URL env var, then provider defaults:
#   ollama → http://localhost:11434
#   vllm   → http://localhost:8000/v1
# Has no effect on managed-API providers (anthropic, openai, gemini, vertexai, bedrock, azure).
# llm_server_base_url: http://localhost:11434

# ── Cloud authentication ──────────────────────────────────────────────────────
# These are environment variables read by the underlying SDKs, not fields
# in this file.  Set them in your shell or .env before launching the TUI.
#
# AWS Bedrock — boto3 credential chain (pick one):
#   Long-lived IAM key   : AWS_ACCESS_KEY_ID + AWS_SECRET_ACCESS_KEY
#   Temporary (aws-vault): add AWS_SESSION_TOKEN to the above two
#   EC2 / ECS / Lambda   : credentials fetched from instance metadata automatically
#
# Google Vertex AI — Application Default Credentials chain (pick one):
#   Service account key  : GOOGLE_APPLICATION_CREDENTIALS=/path/to/key.json
#                          + GOOGLE_CLOUD_PROJECT=my-project
#   User credentials     : run `gcloud auth application-default login`
#   Cloud Run / GCE      : metadata server provides credentials automatically;
#                          GOOGLE_CLOUD_PROJECT still required
#
# Azure OpenAI — pick API key OR service principal (not both):
#   API key              : AZURE_OPENAI_API_KEY=...
#   Service principal    : AZURE_TENANT_ID=... + AZURE_CLIENT_ID=...
#                          + AZURE_CLIENT_SECRET=...
#                          (requires pip install 'open-data-sci[azure]')

# ── MCP tool servers ──────────────────────────────────────────────────────────
# Alternatively, drop a mcp.json file into your workspace's .opendatasci/ folder.
# mcp_servers:
#   - http://localhost:3000/mcp

