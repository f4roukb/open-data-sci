# OpenDataSci — OpenAI-compatible server config
#
# Works with any self-hosted server that exposes an OpenAI-compatible API
# (vLLM, LM Studio, llama.cpp's server, text-generation-inference, etc.).
#
# Usage:
#   opendatasci data.csv --config examples/config_openai_compatible_server.yaml
#
# Example with vLLM:
#   pip install vllm
#   vllm serve meta-llama/Llama-3.2-3B-Instruct
#
# Hugging Face login is required for gated models:
#   huggingface-cli login
#
# No API key required for most local servers.
# TUI flags override any value here at launch.

# ── Primary model ─────────────────────────────────────────────────────────────
provider: openai_compatible_server
model: meta-llama/Llama-3.2-3B-Instruct

# ── Secondary (auxiliary) model ───────────────────────────────────────────────
secondary_provider: openai_compatible_server
secondary_model: meta-llama/Llama-3.2-3B-Instruct

# ── Sampling ──────────────────────────────────────────────────────────────────
temperature: 0.1

# ── Server URL ────────────────────────────────────────────────────────────────
# Falls back to LLM_SERVER_BASE_URL env var, then http://localhost:8000/v1.
# Uncomment if your server is not on the default port or host.
# llm_server_base_url: http://localhost:8000/v1

# ── Agent identity ────────────────────────────────────────────────────────────
name: Sai

# ── Web access ────────────────────────────────────────────────────────────────
extra_web_domains:
  - arxiv.org
  - huggingface.co
  - paperswithcode.com
  - kaggle.com

# ── Parallelism ───────────────────────────────────────────────────────────────
worker_timeout_seconds: 600

# ── Context management ────────────────────────────────────────────────────────
# Smaller open-weight models often have shorter context windows; compact earlier.
midturn_compaction_threshold: 40000

# ── Diagnostics ───────────────────────────────────────────────────────────────
